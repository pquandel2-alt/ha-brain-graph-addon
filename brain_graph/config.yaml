name: Brain Graph
version: "1.11.0"
slug: brain_graph
description: Live 3D graph of all Home Assistant entities, devices, automations and their data flows
url: https://github.com/pquandel2-alt/ha-brain-graph-addon
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
init: false
ingress: true
ingress_port: 8099
# Fester LAN-Port für stabile iframe-Einbindung (Wandtablet-Screensaver).
# Ohne Zuordnung ist nur Ingress aktiv; mit Port erreichbar unter http://<HA-IP>:8099/
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Direkter Zugriff für Dashboard-/Screensaver-Einbindung (?kiosk)
panel_icon: mdi:graph-outline
panel_title: Brain Graph
panel_admin: false
homeassistant_api: true
hassio_api: true
options:
  design: free
  visible_domains: all
  require_area: false
schema:
  design: "list(free|kaskade|radial|puls-kaskade|sonar-halo)"
  visible_domains: str
  require_area: bool
