<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Brain Graph</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0c0c0e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #graph {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #filter-bar {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      max-width: 60%;
    }
    .chip {
      padding: 6px 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #f0e6d3;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      transition: all 200ms ease;
      user-select: none;
    }
    .chip:hover { background: rgba(255,255,255,0.1); }
    .chip.active {
      background: #e07a30;
      border-color: #e07a30;
      color: #0f0900;
    }
    #legend {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(15,9,0,0.9);
      border: 1px solid rgba(224,122,48,0.3);
      border-radius: 8px;
      padding: 12px;
      font-size: 11px;
      color: #f0e6d3;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .legend-item:last-child { margin-bottom: 0; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 50%; }
    #detail-panel {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 300px;
      background: rgba(17,17,21,0.97);
      border-left: 1px solid rgba(255,255,255,0.12);
      overflow-y: auto;
      padding: 16px;
      color: #f0e6d3;
      font-size: 13px;
      z-index: 20;
      transform: translateX(100%);
      transition: transform 250ms ease;
    }
    #detail-panel.open { transform: translateX(0); }
    #detail-panel h3 { margin: 0 0 12px 0; color: #fffde7; padding-right: 24px; }
    #detail-panel p { margin: 6px 0; line-height: 1.4; word-break: break-word; }
    .close-detail {
      position: absolute; top: 10px; right: 12px;
      background: none; border: none; color: #f0e6d3;
      cursor: pointer; font-size: 20px;
    }
    #status {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 10;
      color: #94a3b8;
      font-size: 12px;
      background: rgba(15,9,0,0.7);
      padding: 6px 12px;
      border-radius: 6px;
    }
    #action-log {
      position: absolute;
      bottom: 16px;
      right: 16px;
      z-index: 10;
      background: rgba(15,9,0,0.85);
      border: 1px solid rgba(224,122,48,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 11px;
      color: #f0e6d3;
      max-width: 260px;
      pointer-events: none;
    }
    #action-log .log-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #e07a30;
      margin-bottom: 6px;
    }
    #action-log .log-entry {
      display: flex;
      gap: 8px;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #action-log .log-entry:last-child { margin-bottom: 0; }
    #action-log .log-time { color: #94a3b8; font-variant-numeric: tabular-nums; }
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: #e07a30;
      font-size: 16px;
      z-index: 30;
      background: #0c0c0e;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(224,122,48,0.2);
      border-top-color: #e07a30;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Kiosk-/Screensaver-Modus (?kiosk oder ?screensaver): nur der Graph */
    body.kiosk #filter-bar,
    body.kiosk #legend,
    body.kiosk #status,
    body.kiosk #action-log,
    body.kiosk #detail-panel { display: none !important; }
    body.kiosk { cursor: none; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div>Lade Home Assistant Graph…</div>
  </div>

  <div id="filter-bar">
    <button class="chip active" data-domain="all">Alle</button>
    <button class="chip" data-domain="light">Lichter</button>
    <button class="chip" data-domain="switch">Schalter</button>
    <button class="chip" data-domain="automation">Automationen</button>
    <button class="chip" data-domain="sensor">Sensoren</button>
    <button class="chip" data-domain="media_player">Media</button>
  </div>

  <div id="legend">
    <div class="legend-item"><span class="legend-swatch" style="background:#f97316"></span>HA Core</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#3b82f6"></span>Bereich</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#06b6d4"></span>Gerät</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#fbbf24"></span>Licht</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#f472b6"></span>Automation</div>
  </div>

  <div id="graph"></div>

  <aside id="detail-panel">
    <button class="close-detail">✕</button>
    <div id="detail-content"></div>
  </aside>

  <div id="status">Verbinde…</div>

  <div id="action-log">
    <div class="log-title">Zuletzt aktiv</div>
    <div id="action-log-list"></div>
  </div>

  <script type="module" src="brain-graph.js"></script>
</body>
</html>
